server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    driver-class-name: ${routing.datasource.driver-class-name}
    url: jdbc:mysql://${routing.datasource.host}:${routing.datasource.port}/${routing.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${routing.datasource.username}
    password: ${routing.datasource.password}
  data:
    redis:
      host: ${routing.redis.host}
      port: ${routing.redis.port}
      database: ${routing.redis.database}

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.routing.entity,com.routing.vo
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      routing:
        mapper: debug
        service: info
        controller: info

amap:
  key: ${routing.amap.key}

